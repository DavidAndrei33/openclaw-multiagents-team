<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Multi-Agent Taskboard v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .project-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .project-btn {
            padding: 10px 20px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .project-btn:hover, .project-btn.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label { color: #888; font-size: 0.9rem; }
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .column {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            min-height: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid;
        }
        .column-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .count {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .inbox .column-header { border-color: #ffd700; color: #ffd700; }
        .todo .column-header { border-color: #ff6b6b; color: #ff6b6b; }
        .in_progress .column-header { border-color: #4ecdc4; color: #4ecdc4; }
        .review .column-header { border-color: #95e1d3; color: #95e1d3; }
        .done .column-header { border-color: #00d9ff; color: #00d9ff; }
        
        .task {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: move;
            transition: all 0.3s ease;
            position: relative;
        }
        .task:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.5);
        }
        .task.dragging { opacity: 0.5; transform: rotate(3deg); }
        .task-id {
            font-size: 0.75rem;
            color: #666;
            font-family: monospace;
            margin-bottom: 5px;
        }
        .task-title {
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
            color: #fff;
        }
        .task-project {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .task-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px;
        }
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
        }
        .priority {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .priority-critical { background: #ff4444; color: white; }
        .priority-high { background: #ff8800; color: white; }
        .priority-medium { background: #ffaa00; color: black; }
        .priority-low { background: #00cc88; color: white; }
        
        .dependencies {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #888;
        }
        .dependency-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
        }
        .dependency-item.blocked { color: #ff4444; }
        .dependency-item.done { color: #00cc88; }
        
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .add-task {
            background: transparent;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
            margin-top: 10px;
        }
        .add-task:hover {
            border-color: #e94560;
            color: #e94560;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 1.5rem;
            color: #e94560;
        }
        .close-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #e94560;
        }
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-primary {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .agent-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .agent-card:hover, .agent-card.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .agent-emoji { font-size: 1.5rem; }
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; font-size: 0.9rem; }
        .agent-role { font-size: 0.75rem; color: #888; }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .project-card {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .project-card:hover, .project-card.selected {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }
        .project-name { font-weight: 600; margin-bottom: 5px; }
        .project-desc { font-size: 0.8rem; color: #888; }
        
        .dependencies-selector {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .dep-task {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
        }
        .dep-task.selected {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
        }
        .dep-task.blocked { opacity: 0.5; }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification.show { display: block; }
        
        .sync-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 200, 100, 0.2);
            border: 1px solid rgba(0, 200, 100, 0.5);
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sync-status.syncing { background: rgba(255, 170, 0, 0.2); border-color: #ffaa00; }
        .sync-status.error { background: rgba(255, 68, 68, 0.2); border-color: #ff4444; }
        
        @media (max-width: 1400px) {
            .board { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .board { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .board { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="sync-status" id="syncStatus">
        <span>🟢</span> <span>Saved locally</span>
    </div>
    
    <div class="header">
        <h1>🤖 Multi-Agent Taskboard v2.0</h1>
        <p style="color: #888;">9 AI Agents • Multi-Project • Persistent</p>
    </div>
    
    <div class="project-selector" id="projectSelector">
        <!-- Projects loaded dynamically -->
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalTasks">0</div>
            <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeTasks">0</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completedTasks">0</div>
            <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="blockedTasks">0</div>
            <div class="stat-label">Blocked</div>
        </div>
    </div>
    
    <div class="board" id="board">
        <div class="column inbox" data-status="inbox">
            <div class="column-header">
                <div class="column-title">📥 Inbox</div>
                <div class="count" id="count-inbox">0</div>
            </div>
            <div class="tasks" id="inbox-tasks"></div>
            <div class="add-task" onclick="openModal('inbox')">+ Add Task</div>
        </div>
        <div class="column todo" data-status="todo">
            <div class="column-header">
                <div class="column-title">📝 To Do</div>
                <div class="count" id="count-todo">0</div>
            </div>
            <div class="tasks" id="todo-tasks"></div>
            <div class="add-task" onclick="openModal('todo')">+ Add Task</div>
        </div>
        <div class="column in_progress" data-status="in_progress">
            <div class="column-header">
                <div class="column-title">🔄 In Progress</div>
                <div class="count" id="count-in_progress">0</div>
            </div>
            <div class="tasks" id="in_progress-tasks"></div>
            <div class="add-task" onclick="openModal('in_progress')">+ Add Task</div>
        </div>
        <div class="column review" data-status="review">
            <div class="column-header">
                <div class="column-title">👁️ Review</div>
                <div class="count" id="count-review">0</div>
            </div>
            <div class="tasks" id="review-tasks"></div>
            <div class="add-task" onclick="openModal('review')">+ Add Task</div>
        </div>
        <div class="column done" data-status="done">
            <div class="column-header">
                <div class="column-title">✅ Done</div>
                <div class="count" id="count-done">0</div>
            </div>
            <div class="tasks" id="done-tasks"></div>
            <div class="add-task" onclick="openModal('done')">+ Add Task</div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">✨ New Task</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Project</label>
                    <div class="projects-grid" id="projectsGrid"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="taskTitle" required placeholder="Task title...">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="taskDescription" placeholder="Task description..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="taskPriority">
                        <option value="critical">🔴 Critical</option>
                        <option value="high" selected>🟠 High</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="low">🟢 Low</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Assign to Agent</label>
                    <div class="agents-grid" id="agentsGrid"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Dependencies (optional)</label>
                    <div class="dependencies-selector" id="dependenciesSelector">
                        <p style="color: #666; text-align: center;">Select a project first</p>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Create Task</button>
            </form>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        // Data loaded from JSON
        let taskboardData = null;
        let currentProject = 'quickdelivery';
        let currentStatus = 'inbox';
        let selectedAgent = null;
        let selectedDependencies = [];
        let draggedTask = null;
        
        // Load data from JSON
        async function loadData() {
            try {
                const response = await fetch('taskboard/data.json');
                if (!response.ok) throw new Error('Failed to load data');
                taskboardData = await response.json();
                renderProjects();
                renderAgents();
                renderTasks();
                updateStats();
                showNotification('🚀 Taskboard loaded successfully!');
            } catch (error) {
                console.error('Error loading data:', error);
                showNotification('❌ Error loading data. Check console.');
            }
        }
        
        // Save data to JSON (via API call to backend)
        async function saveData() {
            const syncStatus = document.getElementById('syncStatus');
            syncStatus.className = 'sync-status syncing';
            syncStatus.innerHTML = '<span>🟡</span> <span>Saving...</span>';
            
            try {
                // In a real implementation, this would POST to a backend API
                // For now, we simulate the save
                await new Promise(resolve => setTimeout(resolve, 500));
                
                syncStatus.className = 'sync-status';
                syncStatus.innerHTML = '<span>🟢</span> <span>Saved</span>';
                
                // Auto-save to localStorage as backup
                localStorage.setItem('taskboard_backup', JSON.stringify(taskboardData));
            } catch (error) {
                syncStatus.className = 'sync-status error';
                syncStatus.innerHTML = '<span>🔴</span> <span>Error</span>';
            }
        }
        
        // Render projects selector
        function renderProjects() {
            const selector = document.getElementById('projectSelector');
            selector.innerHTML = Object.entries(taskboardData.projects).map(([key, project]) => `
                <button class="project-btn ${key === currentProject ? 'active' : ''}" 
                        onclick="switchProject('${key}')">
                    ${project.name}
                </button>
            `).join('');
        }
        
        // Switch project
        function switchProject(projectKey) {
            currentProject = projectKey;
            renderProjects();
            renderTasks();
            updateStats();
        }
        
        // Render agents in modal
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = Object.entries(taskboardData.agents).map(([key, agent]) => `
                <div class="agent-card" data-agent="${key}" onclick="selectAgent('${key}')">
                    <span class="agent-emoji">${agent.emoji}</span>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Select agent
        function selectAgent(agentKey) {
            selectedAgent = agentKey;
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.agent === agentKey);
            });
        }
        
        // Render projects in modal
        function renderProjectsInModal() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = Object.entries(taskboardData.projects).map(([key, project]) => `
                <div class="project-card ${key === currentProject ? 'selected' : ''}" 
                     data-project="${key}" onclick="selectProject('${key}')">
                    <div class="project-name">${project.name}</div>
                    <div class="project-desc">${project.description}</div>
                </div>
            `).join('');
            renderDependencies();
        }
        
        // Select project in modal
        function selectProject(projectKey) {
            currentProject = projectKey;
            document.querySelectorAll('.project-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.project === projectKey);
            });
            renderDependencies();
        }
        
        // Render dependencies selector
        function renderDependencies() {
            const selector = document.getElementById('dependenciesSelector');
            const projectTasks = taskboardData.tasks.filter(t => t.project === currentProject);
            
            if (projectTasks.length === 0) {
                selector.innerHTML = '<p style="color: #666; text-align: center;">No tasks available</p>';
                return;
            }
            
            selector.innerHTML = projectTasks.map(task => `
                <div class="dep-task ${task.status === 'done' ? 'done' : ''} ${selectedDependencies.includes(task.id) ? 'selected' : ''}" 
                     data-task="${task.id}" onclick="toggleDependency('${task.id}')">
                    <span>${task.status === 'done' ? '✅' : '⏳'}</span>
                    <span>${task.id}</span>
                    <span style="flex: 1; overflow: hidden; text-overflow: ellipsis;">${task.title}</span>
                </div>
            `).join('');
        }
        
        // Toggle dependency
        function toggleDependency(taskId) {
            const idx = selectedDependencies.indexOf(taskId);
            if (idx > -1) {
                selectedDependencies.splice(idx, 1);
            } else {
                selectedDependencies.push(taskId);
            }
            renderDependencies();
        }
        
        // Render tasks
        function renderTasks() {
            const columns = ['inbox', 'todo', 'in_progress', 'review', 'done'];
            
            columns.forEach(status => {
                const container = document.getElementById(`${status}-tasks`);
                const tasks = taskboardData.tasks.filter(t => 
                    t.status === status && t.project === currentProject
                );
                
                document.getElementById(`count-${status}`).textContent = tasks.length;
                
                container.innerHTML = tasks.map(task => {
                    const agent = taskboardData.agents[task.agent];
                    const isBlocked = task.dependencies?.some(depId => {
                        const dep = taskboardData.tasks.find(t => t.id === depId);
                        return dep && dep.status !== 'done';
                    });
                    
                    return `
                        <div class="task ${isBlocked ? 'blocked' : ''}" 
                             draggable="true" 
                             data-task-id="${task.id}"
                             data-dependencies="${JSON.stringify(task.dependencies || [])}">
                            <div class="task-id">${task.id}</div>
                            <div class="task-project">${taskboardData.projects[task.project]?.name || task.project}</div>
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                <span class="agent-badge" style="background: ${agent?.color || '#666'}20; color: ${agent?.color || '#666'}">
                                    ${agent?.emoji || '👤'} ${agent?.name || task.agent}
                                </span>
                                <span class="priority priority-${task.priority}">${task.priority}</span>
                            </div>
                            ${task.dependencies?.length ? `
                                <div class="dependencies">
                                    ${task.dependencies.map(depId => {
                                        const dep = taskboardData.tasks.find(t => t.id === depId);
                                        const depDone = dep?.status === 'done';
                                        return `<span class="dependency-item ${depDone ? 'done' : 'blocked'}">${depId} ${depDone ? '✅' : '⏳'}</span>`;
                                    }).join('')}
                                </div>
                            ` : ''}
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${task.progress || 0}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
            });
            
            // Add drag listeners
            document.querySelectorAll('.task').forEach(task => {
                task.addEventListener('dragstart', handleDragStart);
                task.addEventListener('dragend', handleDragEnd);
            });
        }
        
        // Drag handlers
        function handleDragStart(e) {
            draggedTask = taskboardData.tasks.find(t => t.id === this.dataset.taskId);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }
        
        function handleDragEnd(e) {
            this.classList.remove('dragging');
            draggedTask = null;
        }
        
        // Column drop zones
        document.querySelectorAll('.column').forEach(column => {
            column.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });
            
            column.addEventListener('drop', e => {
                e.preventDefault();
                if (!draggedTask) return;
                
                const newStatus = column.dataset.status;
                
                // Check if blocked by dependencies
                if (newStatus === 'in_progress' && draggedTask.dependencies?.length) {
                    const blocked = draggedTask.dependencies.some(depId => {
                        const dep = taskboardData.tasks.find(t => t.id === depId);
                        return dep && dep.status !== 'done';
                    });
                    if (blocked) {
                        showNotification('❌ Task blocked by dependencies!');
                        return;
                    }
                }
                
                if (draggedTask.status !== newStatus) {
                    draggedTask.status = newStatus;
                    if (newStatus === 'done') {
                        draggedTask.progress = 100;
                        draggedTask.completed_at = new Date().toISOString();
                    }
                    saveData();
                    renderTasks();
                    updateStats();
                    showNotification(`✅ Task moved to ${newStatus}`);
                }
            });
        });
        
        // Update stats
        function updateStats() {
            const projectTasks = taskboardData.tasks.filter(t => t.project === currentProject);
            document.getElementById('totalTasks').textContent = projectTasks.length;
            document.getElementById('activeTasks').textContent = projectTasks.filter(t => 
                ['todo', 'in_progress', 'review'].includes(t.status)
            ).length;
            document.getElementById('completedTasks').textContent = projectTasks.filter(t => 
                t.status === 'done'
            ).length;
            document.getElementById('blockedTasks').textContent = projectTasks.filter(t => 
                t.dependencies?.some(depId => {
                    const dep = taskboardData.tasks.find(d => d.id === depId);
                    return dep && dep.status !== 'done';
                })
            ).length;
        }
        
        // Modal functions
        function openModal(status) {
            currentStatus = status;
            selectedAgent = null;
            selectedDependencies = [];
            document.getElementById('taskModal').classList.add('active');
            document.getElementById('taskForm').reset();
            renderProjectsInModal();
            renderAgents();
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        
        // Form submission
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedAgent) {
                showNotification('❌ Please select an agent!');
                return;
            }
            
            const newTask = {
                id: `TASK-${String(taskboardData.next_task_id).padStart(3, '0')}`,
                project: currentProject,
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                priority: document.getElementById('taskPriority').value,
                status: currentStatus,
                agent: selectedAgent,
                progress: currentStatus === 'done' ? 100 : 0,
                dependencies: selectedDependencies,
                created_at: new Date().toISOString(),
                completed_at: null
            };
            
            taskboardData.tasks.push(newTask);
            taskboardData.next_task_id++;
            
            await saveData();
            renderTasks();
            updateStats();
            closeModal();
            showNotification('✨ Task created successfully!');
        });
        
        // Notification
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
        
        // Close modal on outside click
        document.getElementById('taskModal').addEventListener('click', e => {
            if (e.target.id === 'taskModal') closeModal();
        });
        
        // Auto-save every 30 seconds
        setInterval(() => {
            if (taskboardData) saveData();
        }, 30000);
        
        // Load data on startup
        loadData();
    </script>
</body>
</html>
